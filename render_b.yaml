services:
  - type: web
    name: signmeta-backend-b
    env: python
    runtime: python
    pythonVersion: "3.12.9"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main_b:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: RENDER_GROUP
        value: B
